<div id="fullscreen" class="fullscreen">
  <div class="map-container">
    <div id="map" class="map-view"></div>
    
    <!-- Panel for drawing controls -->
    <div class="controls-panel">
      <div class="draw-controls">
        <button (click)="onDrawTypeChange('Point')"
                [class.active]="currentDrawType === 'Point'">
          Draw Point
        </button>
        <button (click)="onDrawTypeChange('LineString')"
                [class.active]="currentDrawType === 'LineString'">
          Draw Line
        </button>
        <button (click)="onDrawTypeChange('Polygon')"
                [class.active]="currentDrawType === 'Polygon'">
          Draw Polygon
        </button>
      </div>
      <button class="logout-button" (click)="onLogout()">Logout</button>
    </div>
  </div>
</div>

<p>BankMapApp - 2025</p>
